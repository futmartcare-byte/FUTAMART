<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FutaMart - No Internet</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#080810;font-family:'Inter',sans-serif;overflow:hidden}
#app{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
#logo{width:64px;height:64px;border-radius:22%;object-fit:cover;box-shadow:0 0 24px rgba(255,120,0,0.35);margin-bottom:12px}
#brand{font-size:22px;font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:24px}
#brand span{color:#FF8C00}
#offline-screen{display:flex;flex-direction:column;align-items:center}
#game-screen{display:none;flex-direction:column;align-items:center;width:100%}
.wifi-icon{width:64px;height:64px;margin-bottom:20px;opacity:0.3}
#offline-title{font-size:20px;font-weight:800;color:#fff;margin-bottom:8px}
#offline-sub{font-size:14px;color:rgba(255,255,255,0.4);line-height:1.6;max-width:260px;margin-bottom:32px}
.btn-primary{padding:13px 32px;border-radius:100px;border:none;background:linear-gradient(135deg,#FF6B00,#FF8C00,#FFB000);color:#fff;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 24px rgba(255,100,0,0.4);margin-bottom:12px;width:200px}
.btn-primary:active{transform:scale(0.97)}
.btn-ghost{padding:11px 32px;border-radius:100px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);font-size:14px;font-weight:600;cursor:pointer;width:200px}
.btn-ghost:active{background:rgba(255,255,255,0.08)}
#stats{display:flex;gap:16px;margin-bottom:14px}
.stat{text-align:center;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:8px 20px}
.stat-label{font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.stat-value{font-size:22px;font-weight:800;color:#fff;line-height:1.2}
.stat-value.orange{color:#FF8C00}
#game-wrap{position:relative;border-radius:20px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,0.07),0 20px 60px rgba(0,0,0,0.6)}
canvas{display:block}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,8,16,0.88);backdrop-filter:blur(8px);transition:opacity 0.3s}
#overlay.hidden{opacity:0;pointer-events:none}
#ov-title{font-size:13px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
#ov-score{font-size:52px;font-weight:900;color:#fff;letter-spacing:-2px;line-height:1}
#ov-best{font-size:13px;color:rgba(255,140,0,0.7);margin:6px 0 24px;font-weight:600}
#ov-btn{padding:13px 36px;border-radius:100px;border:none;background:linear-gradient(135deg,#FF6B00,#FF8C00,#FFB000);color:#fff;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 24px rgba(255,100,0,0.5)}
#ov-btn:active{transform:scale(0.96)}
#ov-hint{margin-top:14px;font-size:12px;color:rgba(255,255,255,0.25);font-weight:500}
#speed-bar-wrap{width:100%;margin-top:12px;display:flex;align-items:center;gap:8px}
#speed-label{font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;font-weight:600;white-space:nowrap}
#speed-track{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden}
#speed-fill{height:100%;width:0%;background:linear-gradient(90deg,#FF6B00,#FFB000);border-radius:4px;transition:width 0.3s}
#back-btn{margin-top:14px;font-size:12px;color:rgba(255,255,255,0.25);font-weight:600;cursor:pointer;background:none;border:none;text-decoration:underline}
</style>
</head>
<body>
<div id="app">
  <img id="logo" src="https://media.base44.com/images/public/6a2370f9e6d0e6ce0d081a52/5bd4ffbb9_QjhED.jpg" alt="FutaMart"/>
  <div id="brand">FUTA<span>MART</span></div>

  <div id="offline-screen">
    <svg class="wifi-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <div id="offline-title">You're offline</div>
    <div id="offline-sub">Check your internet connection and try again. Or kill time with a quick game!</div>
    <button class="btn-primary" onclick="window.location.reload()">&#8635; Try Again</button>
    <button class="btn-ghost" onclick="showGame()">Play a Game</button>
  </div>

  <div id="game-screen">
    <div id="stats">
      <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score-el">0</div></div>
      <div class="stat"><div class="stat-label">Best</div><div class="stat-value orange" id="best-el">0</div></div>
    </div>
    <div id="game-wrap">
      <canvas id="c"></canvas>
      <div id="overlay">
        <div id="ov-title">Ready?</div>
        <div id="ov-score"></div>
        <div id="ov-best">Best: <span id="ov-best-sp">0</span></div>
        <button id="ov-btn">Play</button>
        <div id="ov-hint">Tap · Space · Click to jump</div>
      </div>
    </div>
    <div id="speed-bar-wrap">
      <div id="speed-label">Speed</div>
      <div id="speed-track"><div id="speed-fill"></div></div>
    </div>
    <button id="back-btn" onclick="showOffline()">&#8592; Back</button>
  </div>
</div>
<script>
function showGame(){
  document.getElementById('offline-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  initGame();
}
function showOffline(){
  document.getElementById('game-screen').style.display='none';
  document.getElementById('offline-screen').style.display='flex';
}

function initGame(){
  const c=document.getElementById('c');
  const ctx=c.getContext('2d');
  const overlay=document.getElementById('overlay');
  const scoreEl=document.getElementById('score-el');
  const bestEl=document.getElementById('best-el');
  const ovScore=document.getElementById('ov-score');
  const ovBest=document.getElementById('ov-best-sp');
  const speedFill=document.getElementById('speed-fill');
  const W=Math.min(window.innerWidth-32,480);
  const H=Math.round(W*0.45);
  c.width=W;c.height=H;
  const GY=H-40;
  let score=0,best=0,alive=false,started=false;
  let spd=4,frame=0,nextObs=80;
  let particles=[],stars=[],bgX=0,raf;
  for(let i=0;i<40;i++) stars.push({x:Math.random()*W,y:Math.random()*(GY-20),r:Math.random()*1.2+0.3,a:Math.random()});
  const P={x:60,y:GY,vy:0,w:22,h:30,jumping:false,animFrame:0,dead:false,squish:1};
  const obs=[];
  function reset(){
    score=0;frame=0;spd=4;nextObs=100;alive=true;started=true;
    obs.length=0;particles.length=0;bgX=0;
    P.x=60;P.y=GY;P.vy=0;P.jumping=false;P.dead=false;P.animFrame=0;P.squish=1;
    overlay.classList.add('hidden');scoreEl.textContent='0';
    cancelAnimationFrame(raf);raf=requestAnimationFrame(tick);
  }
  function jump(){
    if(!started||!alive){reset();return;}
    if(!P.jumping&&!P.dead){P.vy=-13.5;P.jumping=true;P.squish=0.7;addParticles(P.x+P.w/2,GY+P.h,'jump');}
  }
  function addParticles(x,y,type){
    for(let i=0;i<(type==='jump'?6:14);i++){
      const a=type==='death'?(Math.random()*Math.PI*2):(Math.random()*Math.PI+Math.PI);
      const sp=type==='death'?(Math.random()*5+2):(Math.random()*2+1);
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-(type==='death'?3:0),life:1,type});
    }
  }
  function drawBg(){
    const grd=ctx.createLinearGradient(0,0,0,GY);
    grd.addColorStop(0,'#080810');grd.addColorStop(1,'#0d0d20');
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{
      ctx.globalAlpha=s.a*(0.4+Math.sin(frame*0.02+s.x)*0.3);
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    });ctx.globalAlpha=1;
    ctx.fillStyle='rgba(255,140,0,0.04)';
    for(let i=0;i<3;i++){const cx=((bgX*0.08+i*200)%(W+100))-50;ctx.beginPath();ctx.arc(cx,GY-60,80,0,Math.PI*2);ctx.fill();}
  }
  function drawGround(){
    ctx.fillStyle='#13132a';ctx.fillRect(0,GY+P.h,W,H-(GY+P.h));
    ctx.strokeStyle='rgba(255,140,0,0.25)';ctx.lineWidth=1.5;ctx.setLineDash([6,8]);ctx.lineDashOffset=-bgX*0.4;
    ctx.beginPath();ctx.moveTo(0,GY+P.h+1);ctx.lineTo(W,GY+P.h+1);ctx.stroke();ctx.setLineDash([]);
    for(let i=0;i<5;i++){const tx=((bgX*0.6+i*90)%(W+30))-15;ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fillRect(tx,GY+P.h+6,50,3);}
  }
  function drawPlayer(){
    if(P.dead)return;
    const bounce=P.jumping?0:Math.sin(P.animFrame*0.3)*1.5;
    ctx.save();ctx.translate(P.x+P.w/2,P.y+P.h/2+bounce);
    const sq=P.squish;ctx.scale(sq<1?sq+(1-sq)*0.15:1,sq<1?2-sq-(2-sq)*0.15:1);
    ctx.fillStyle='rgba(255,100,0,0.2)';ctx.beginPath();ctx.ellipse(0,P.h/2+4,10,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FF6B00';ctx.beginPath();ctx.roundRect(-P.w/2,0,P.w,P.h*0.65,[4,4,2,2]);ctx.fill();
    const legA=P.jumping?0:Math.sin(P.animFrame*0.35)*18;
    ctx.fillStyle='#e55a00';
    ctx.save();ctx.translate(-5,P.h*0.6);ctx.rotate(legA*Math.PI/180);ctx.fillRect(-3,0,6,P.h*0.38);ctx.restore();
    ctx.save();ctx.translate(5,P.h*0.6);ctx.rotate(-legA*Math.PI/180);ctx.fillRect(-3,0,6,P.h*0.38);ctx.restore();
    ctx.fillStyle='#FF8C00';ctx.beginPath();ctx.ellipse(0,-P.h*0.2,P.w*0.42,P.w*0.42,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(4,-P.h*0.22,5,5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a0a00';ctx.beginPath();ctx.ellipse(5,-P.h*0.24,2.5,2.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(6,-P.h*0.27,1,1,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FF6B00';ctx.beginPath();ctx.moveTo(-4,-P.h*0.44);ctx.lineTo(0,-P.h*0.55);ctx.lineTo(4,-P.h*0.44);ctx.fill();
    ctx.restore();P.squish+=(1-P.squish)*0.2;
  }
  function drawObs(o){
    const grd=ctx.createLinearGradient(o.x,o.y,o.x+o.w,o.y+o.h);
    grd.addColorStop(0,'#FF4500');grd.addColorStop(1,'#cc2200');
    ctx.fillStyle=grd;ctx.beginPath();ctx.roundRect(o.x,o.y,o.w,o.h,[4,4,2,2]);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(o.x+4,o.y+4,3,o.h-10);
    ctx.fillStyle='rgba(255,200,0,0.7)';ctx.fillRect(o.x+o.w*0.2,o.y+4,o.w*0.6,3);ctx.fillRect(o.x+o.w*0.2,o.y+o.h-7,o.w*0.6,3);
    ctx.fillStyle='rgba(255,80,0,0.15)';ctx.beginPath();ctx.ellipse(o.x+o.w/2,o.y+o.h+2,o.w*0.6,4,0,0,Math.PI*2);ctx.fill();
  }
  function drawParticles(){
    particles.forEach(p=>{ctx.globalAlpha=p.life*0.8;ctx.fillStyle=p.type==='death'?'rgba(255,80,0,0.9)':'rgba(255,180,0,0.7)';ctx.beginPath();ctx.arc(p.x,p.y,p.life*4,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
  }
  function drawHUD(){
    ctx.fillStyle='rgba(255,255,255,0.06)';ctx.beginPath();ctx.roundRect(W-70,8,62,24,8);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='700 13px Inter,sans-serif';ctx.textAlign='right';ctx.fillText(String(score).padStart(5,'0'),W-12,26);ctx.textAlign='left';
    if(spd>7){ctx.fillStyle=spd>9?'rgba(255,50,0,0.9)':'rgba(255,180,0,0.8)';ctx.font='700 10px Inter,sans-serif';ctx.fillText(spd>9?'INSANE!':'FAST!',10,22);}
  }
  function die(){
    alive=false;P.dead=true;addParticles(P.x+P.w/2,P.y+P.h/2,'death');
    if(score>best){best=score;bestEl.textContent=best;}
    setTimeout(()=>{
      ovScore.textContent=score;ovBest.textContent=best;
      overlay.querySelector('#ov-title').textContent=score>100?'Legendary! 🔥':score>50?'Amazing run!':score>20?'Good run!':'You crashed!';
      document.getElementById('ov-btn').textContent='Play Again';
      overlay.classList.remove('hidden');
    },700);
  }
  function tick(){
    if(!alive)return;
    frame++;bgX+=spd;score=Math.floor(frame/8);spd=4+score*0.022;
    const pct=Math.min(100,(spd-4)/8*100);
    speedFill.style.width=pct+'%';
    speedFill.style.background=pct>70?'linear-gradient(90deg,#FF3D00,#FF0000)':pct>40?'linear-gradient(90deg,#FF6B00,#FFB000)':'linear-gradient(90deg,#FF8C00,#FFE000)';
    scoreEl.textContent=score;
    P.vy+=0.55;P.y+=P.vy;if(P.y>=GY){P.y=GY;P.vy=0;P.jumping=false;}P.animFrame++;
    nextObs--;
    if(nextObs<=0){
      const types=[{w:18,h:36},{w:28,h:24},{w:14,h:48},{w:22,h:30},{w:32,h:20}];
      const t=types[Math.floor(Math.random()*types.length)];
      obs.push({x:W+20,y:GY+P.h-t.h,w:t.w,h:t.h});
      nextObs=Math.max(35,110-score*0.35)+(Math.random()*40-20);
    }
    for(let i=obs.length-1;i>=0;i--){
      obs[i].x-=spd;if(obs[i].x+obs[i].w<0){obs.splice(i,1);continue;}
      const o=obs[i];if(P.x+16>o.x+3&&P.x+6<o.x+o.w-3&&P.y+4<o.y+o.h&&P.y+P.h>o.y+4){die();return;}
    }
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.04;});
    particles=particles.filter(p=>p.life>0);
    drawBg();drawGround();obs.forEach(drawObs);drawParticles();drawPlayer();drawHUD();
    raf=requestAnimationFrame(tick);
  }
  drawBg();drawGround();drawPlayer();drawHUD();
  document.getElementById('ov-btn').onclick=reset;
  c.addEventListener('click',jump);
  c.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
  document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();jump();}});
}

window.addEventListener('online',()=>{window.location.href='/';});
</script>
</body>
</html>
